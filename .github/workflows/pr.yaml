name: pr

on: [pull_request]

jobs:
  check-commit:
    uses: wittdennis/pipelines/.github/workflows/cog-validate.yaml@52bf75a225e15cef3e2cc4e7fe47d0fc965f5733 # 2.0.9
    with:
      check-latest-tag-only: true
      ignore-merge-commits: true

  go-lint:
    uses: wittdennis/pipelines/.github/workflows/go-lint.yaml@52bf75a225e15cef3e2cc4e7fe47d0fc965f5733 # 2.0.9
    with:
      working-directory: src
      go-version: "1.26.2" # renovate: datasource=github-tags depName=golang/go extractVersion=^go(?<version>.*)$ versioning=semver

  hadolint:
    uses: wittdennis/pipelines/.github/workflows/hadolint.yaml@52bf75a225e15cef3e2cc4e7fe47d0fc965f5733 # 2.0.9

  build-image:
    uses: wittdennis/pipelines/.github/workflows/container-image-build.yaml@52bf75a225e15cef3e2cc4e7fe47d0fc965f5733 # 2.0.9
    needs:
      - check-commit
      - go-lint
      - hadolint
    with:
      image-name: github-app
      create-artifacts: false
      build-args: |
        VERSION=${{ github.ref_name }}
        GIT_COMMIT=${{ github.sha }}

  go-build:
    uses: wittdennis/pipelines/.github/workflows/go-build.yaml@52bf75a225e15cef3e2cc4e7fe47d0fc965f5733 # 2.0.9
    needs:
      - check-commit
      - go-lint
      - hadolint
    with:
      go-version: "1.26.2" # renovate: datasource=github-tags depName=golang/go extractVersion=^go(?<version>.*)$ versioning=semver
      ldflags: -s -w -X github-app/cmd/version.appVersion=${{ github.ref_name }} -X github-app/cmd/version.gitCommit=${{ github.sha }} -X github-app/cmd/version.buildDate=$(date +"%Y-%m-%dT%H:%M:%SZ")
      cgo-enabled: false
      working-directory: src
